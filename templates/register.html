{% extends 'base.html' %}

{% block content %}
<h2>Register</h2>

<div class="form-card auth-card">
    <form method="POST">
        <label>Username</label>
        <input type="text" name="username" required placeholder="Choose a username">

        <label>Email</label>
        <input type="email" name="email" required placeholder="Enter your email">

        <label>Password</label>
        <input type="password" name="password" required placeholder="Min 6 characters">

        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required placeholder="Repeat your password">

        <button type="submit" class="btn" style="margin-top:16px; width:100%;">Register</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
</div>
{% endblock %}
